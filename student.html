<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HackShield Bingo - Leerling</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <h1>HackShield Bingo</h1>
        <div class="session-player-info">
          <span>Sessie: <strong id="sessionCodeDisplay"></strong></span>
          <span>Speler: <strong id="playerNameDisplay"></strong></span>
        </div>
      </div>
      <div class="header-right">
        <div class="joker-display">
          🎴 Jokers: <strong id="jokerCount">0</strong>
        </div>
        <button id="bingoBtn" class="btn-bingo">🏆 BINGO!</button>
        <button id="logout" class="btn-secondary">Uitloggen</button>
      </div>
    </header>

    <!-- Inlogscherm -->
    <div id="joinScreen">
      <div class="card">
        <h2>Doe mee met Bingo</h2>
        <input type="text" id="playerName" placeholder="Jouw naam" required>
        <input type="text" id="sessionCodeInput" placeholder="Sessiecode (4 cijfers)" maxlength="4" required>
        <button id="joinBtn" class="btn-primary">Deelnemen</button>
        <div id="joinError" class="error"></div>
      </div>
    </div>

    <!-- Bingo scherm -->
    <div id="gameScreen" style="display:none;">
      <!-- Vraagweergave -->
      <div id="studentQuestionArea" style="display:none;" class="question-card">
        <div class="question-box">
          <div id="studentQuestionText" class="question-text"></div>
          <div id="studentOptions" class="options"></div>
          <button id="submitAnswerBtn" class="btn-primary">Antwoord verzenden</button>
          <div id="answerFeedback" class="feedback"></div>
        </div>
      </div>

      <!-- Bingokaart -->
      <div class="bingo-card-container">
        <div id="bingoCard" class="bingo-grid"></div>
        <p class="hint">Klik op een vakje om het aan of uit te vinken</p>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/student.js"></script>
</body>
</html>
