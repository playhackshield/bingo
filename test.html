<!DOCTYPE html>
<html>
<head>
    <title>Sessies - Test</title>
</head>
<body>
    <h1>Sessies Pagina</h1>
    <div id="status">Controleren...</div>
    <button onclick="logout()">Uitloggen</button>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    
    <script>
        firebase.auth().onAuthStateChanged(user => {
            const statusDiv = document.getElementById('status');
            if (user) {
                statusDiv.innerHTML = `✅ Ingelogd als: ${user.email}<br>User ID: ${user.uid}`;
            } else {
                statusDiv.innerHTML = '❌ Niet ingelogd! <a href="index.html">Ga naar login</a>';
            }
        });
        
        function logout() {
            firebase.auth().signOut().then(() => {
                window.location.href = 'index.html';
            });
        }
    </script>
</body>
</html>
