<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HackShield Bingo - Sessiebeheer</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico">  
</head>
  
<body>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/sessions.js"></script>

<script>
  // DEBUG: Na het laden van firebase-config
  console.log("3. firebase-config geladen");
  console.log("4. firebase.apps.length:", firebase.apps.length);
  console.log("5. auth object:", firebase.auth());
  
  // Check of er een gebruiker is ingelogd
  firebase.auth().onAuthStateChanged(user => {
    if (user) {
      console.log("✅ GEBRUIKER IS INGELOGD:", user.email);
      console.log("   User ID:", user.uid);
      console.log("   Email verified:", user.emailVerified);
    } else {
      console.log("❌ GEEN GEBRUIKER INGELOGD");
      console.log("   Redirect naar index.html over 2 seconden...");
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 2000);
    }
  });
</script>
  
  <div class="container">
    <header>
      <h1>🎲 HackShield Bingo – Sessiebeheer</h1>
      <div class="header-buttons">
        <button id="logoutBtn" class="btn-secondary">Uitloggen</button>
        <a href="index.html" class="btn-secondary">← Startpagina</a>
      </div>
    </header>

    <!-- Nieuwe sessie aanmaken -->
    <div class="card">
      <h2><i class="fas fa-plus-circle"></i> Nieuwe Bingosessie</h2>
      <div class="form-group">
        <label for="newGridSize">Aantal vakjes op de kaart:</label>
        <select id="newGridSize">
          <option value="9">3x3 (9 vakjes)</option>
          <option value="16" selected>4x4 (16 vakjes)</option>
          <option value="25">5x5 (25 vakjes)</option>
        </select>
      </div>
      <button id="createSessionBtn" class="btn-primary">🚀 Sessie Starten</button>
    </div>

    <!-- Actieve sessies -->
    <div class="card">
      <h2><i class="fas fa-play-circle"></i> Actieve Sessies</h2>
      <div id="activeSessionsList" class="sessions-list">
        <div class="loading">Sessies laden...</div>
      </div>
    </div>

    <!-- Beëindigde sessies (archief) -->
    <div class="card">
      <h2><i class="fas fa-archive"></i> Eerdere Sessies</h2>
      <div id="endedSessionsList" class="sessions-list">
        <div class="loading">Sessies laden...</div>
      </div>
    </div>
  </div>
</body>
</html>
